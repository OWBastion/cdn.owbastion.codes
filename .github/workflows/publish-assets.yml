name: Publish assets to R2

on:
  push:
    branches:
      - main
    paths:
      - assets/achievements/**
      - .github/workflows/publish-assets.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-assets
  cancel-in-progress: true

jobs:
  publish-achievements:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      CACHE_CONTROL: public, max-age=3600, s-maxage=86400, stale-while-revalidate=604800

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebP tools
        run: sudo apt-get update && sudo apt-get install --yes webp

      - name: Generate WebP files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/achievements-webp"

          shopt -s nullglob
          png_files=(assets/achievements/*.png)
          if (( ${#png_files[@]} == 0 )); then
            echo "No achievement PNG files found" >&2
            exit 1
          fi

          for source in "${png_files[@]}"; do
            filename="$(basename "$source" .png)"
            cwebp -quiet -lossless "$source" -o "$RUNNER_TEMP/achievements-webp/$filename.webp"
          done

      - name: Upload PNG files to R2
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp assets/achievements "s3://$R2_BUCKET/achievements" \
            --recursive \
            --exclude '*' \
            --include '*.png' \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type image/png \
            --cache-control "$CACHE_CONTROL"

      - name: Upload WebP files to R2
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp "$RUNNER_TEMP/achievements-webp" "s3://$R2_BUCKET/achievements" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type image/webp \
            --cache-control "$CACHE_CONTROL"
